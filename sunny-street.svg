<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4fbf6" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfefb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#0b2a18" flood-opacity="0.06" />
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#g-bg)" />

  <!-- Paper -->
  <g transform="translate(100,80)">
    <rect x="0" y="0" width="600" height="440" rx="12" fill="url(#paper)" stroke="#e6efe5" filter="url(#shadow)" />

    <!-- Content lines -->
    <g fill="#e6efe5">
      <rect x="36" y="36" width="520" height="18" rx="6" />
      <rect x="36" y="68" width="520" height="12" rx="6" />
      <rect x="36" y="92" width="480" height="12" rx="6" />
      <rect x="36" y="116" width="380" height="12" rx="6" />
      <rect x="36" y="160" width="520" height="12" rx="6" />
      <rect x="36" y="186" width="480" height="12" rx="6" />
    </g>

    <!-- Signature area -->
    <rect x="36" y="300" width="420" height="12" rx="6" fill="#dce6db" />
    <path d="M60 296 C120 320, 180 292, 260 312 C320 328, 380 304, 460 322" stroke="#2f7f46" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Pen and hand (stylized) -->
    <g transform="translate(380,250) rotate(18)">
      <rect x="0" y="0" width="160" height="18" rx="4" fill="#2f7f46" />
      <rect x="140" y="-8" width="24" height="34" rx="4" fill="#dfe7dd" />
      <circle cx="152" cy="9" r="5" fill="#15421f" />
    </g>

    <!-- Hand under pen -->
    <g transform="translate(420,280)">
      <path d="M-20 12 C-10 4, 10 0, 36 2 C62 4, 76 16, 86 22 C92 26, 96 40, 82 44 C64 50, 40 36, 8 28 C-10 24, -26 20, -20 12 Z" fill="#f6eada" />
    </g>

  </g>

  <!-- Small emblem -->
  <g transform="translate(660,480)">
    <circle cx="0" cy="0" r="36" fill="#7bb270" />
    <text x="0" y="6" text-anchor="middle" font-family="Merriweather, serif" font-size="18" fill="#15421f" font-weight="700">TRD</text>
  </g>

</svg>
