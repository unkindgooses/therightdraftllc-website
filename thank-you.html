<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | The Right Draft LLC</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .thank-you {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      padding: 2rem;
    }
    .thank-you-card {
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      max-width: 32rem;
      padding: 2.5rem;
      text-align: center;
    }
    .thank-you-card h1 {
      margin-bottom: 1rem;
    }
    .thank-you-card p {
      color: var(--muted);
      margin-bottom: 1.75rem;
    }
  </style>
</head>
<body>
  <main class="thank-you">
    <article class="thank-you-card">
      <h1>Thank you!</h1>
      <p>Your inquiry has been sent. We will review it and respond as soon as possible.</p>
      <a href="index.html" class="button button-primary">Return to the homepage</a>
    </article>
  </main>
</body>
</html>
